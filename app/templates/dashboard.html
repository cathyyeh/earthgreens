<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Earth Greens Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: Arial, sans-serif; max-width: 1320px; margin: 0 auto; padding: 24px; background:#f4f0eb; color:#2f241f; }
.hero,.panel,.card { background:#fff; border-radius:20px; padding:18px; box-shadow:0 10px 28px rgba(70,55,44,.08); }
.grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:18px; }
.chartbox { width:100%; height:380px; }
</style>
</head>
<body>
<section class="hero">
<h1>春綠 Earth Greens｜內部銷售與庫存儀表板</h1>
<p>最後更新：{{ latest.uploaded_at if latest else "尚未上傳資料" }}</p>
</section>

<div class="grid">
  <div class="card"><div>營收</div><div style="font-size:30px;font-weight:700;">NT$ {{ "{:,.0f}".format(revenue) }}</div></div>
  <div class="card"><div>訂單筆數</div><div style="font-size:30px;font-weight:700;">{{ "{:,.0f}".format(orders) }}</div></div>
  <div class="card"><div>銷售件數</div><div style="font-size:30px;font-weight:700;">{{ "{:,.0f}".format(qty) }}</div></div>
  <div class="card"><div>不重複客戶數</div><div style="font-size:30px;font-weight:700;">{{ "{:,.0f}".format(unique_customer_count) }}</div></div>
</div>

<div class="panel" style="margin-bottom:18px;"><h3>客戶分群（含佔比 %）</h3><div class="chartbox"><canvas id="segmentChart"></canvas></div></div>
<div class="panel" style="margin-bottom:18px;"><h3>季度銷售分析（含 YoY %）</h3><div class="chartbox"><canvas id="quarterChart"></canvas></div></div>
<div class="panel" style="margin-bottom:18px;"><h3>季度銷售件數</h3><div class="chartbox"><canvas id="quarterQtyChart"></canvas></div></div>

<script>
const barColors = ['#b27373','#c28c8c','#d7aaaa','#8f6a6a','#a96f6f','#c9b2a6','#b68a75','#d4a373'];
const segLabels = {{ segment_labels|tojson }};
const segVals = {{ segment_values|tojson }};
const segTotal = segVals.reduce((a,b)=>a+b,0);
const quarterLabels = {{ quarter_labels|tojson }};
const quarterValues = {{ quarter_values|tojson }};
const quarterQtyValues = {{ quarter_qty_values|tojson }};
const quarterYoyValues = {{ quarter_yoy_values|tojson }};

new Chart(document.getElementById('segmentChart'), {
  type:'pie',
  data:{labels: segLabels, datasets:[{data: segVals, backgroundColor:['#b27373','#c28c8c','#d7aaaa']}]},
  options:{
    responsive:true, maintainAspectRatio:false,
    plugins:{
      tooltip:{
        callbacks:{
          label:function(ctx){
            const val = ctx.raw || 0;
            const pct = segTotal ? (val/segTotal*100).toFixed(1) : '0.0';
            return `${ctx.label}: ${val} (${pct}%)`;
          }
        }
      },
      legend:{position:'bottom'}
    }
  }
});

new Chart(document.getElementById('quarterChart'), {
  type:'bar',
  data:{
    labels: quarterLabels,
    datasets:[
      {label:'季度營收', data: quarterValues, backgroundColor: quarterValues.map((_,i)=>barColors[i%barColors.length])},
      {label:'YoY %', data: quarterYoyValues, type:'line', yAxisID:'y1', borderColor:'#7a4f4f', tension:0.2}
    ]
  },
  options:{
    responsive:true, maintainAspectRatio:false,
    scales:{
      y:{beginAtZero:true},
      y1:{beginAtZero:false, position:'right', grid:{drawOnChartArea:false}, ticks:{callback:(v)=>v+'%'}}
    },
    plugins:{
      tooltip:{
        callbacks:{
          label:function(ctx){
            if (ctx.dataset.label === 'YoY %') {
              return ctx.raw === null ? 'YoY: N/A' : `YoY: ${ctx.raw}%`;
            }
            return `${ctx.dataset.label}: ${ctx.raw}`;
          }
        }
      }
    }
  }
});

new Chart(document.getElementById('quarterQtyChart'), {
  type:'bar',
  data:{labels: quarterLabels, datasets:[{label:'季度件數', data: quarterQtyValues, backgroundColor: quarterQtyValues.map((_,i)=>barColors[i%barColors.length])}]},
  options:{responsive:true, maintainAspectRatio:false}
});
</script>
</body>
</html>
