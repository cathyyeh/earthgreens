<!DOCTYPE html>
<html lang="zh-Hant">
<head><meta charset="UTF-8"><title>資料上傳</title></head>
<body style="font-family:Arial;max-width:880px;margin:40px auto;padding:0 20px;background:#f7f4f1;">
<h1>QDM 報表上傳頁</h1>
<div style="background:#fff;border:1px solid #ddd;border-radius:12px;padding:24px;">
<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;">
  <a href="/admin/upload" style="display:inline-block;padding:10px 14px;border-radius:10px;background:#f8efef;color:#9b5a5a;text-decoration:none;font-weight:600;">前往上傳報表</a>
  <a href="/dashboard" style="display:inline-block;padding:10px 14px;border-radius:10px;background:#f8efef;color:#9b5a5a;text-decoration:none;font-weight:600;">返回 dashboard</a>
</div>
<form method="post" enctype="multipart/form-data">
<div>訂單報表</div><input type="file" name="order_file" required>
<div style="margin-top:12px;">庫存報表</div><input type="file" name="inventory_file" required>
<button type="submit" style="margin-top:20px;padding:10px 16px;background:#a96f6f;color:white;border:none;border-radius:8px;">更新 Dashboard</button>
</form>
{% if message %}<div style="margin-top:16px;color:green;">{{ message }}</div>{% endif %}
{% if latest %}<hr><div>最後更新時間：{{ latest.uploaded_at }}</div><div>上次訂單報表：{{ latest.order_file_name }}</div><div>上次庫存報表：{{ latest.inventory_file_name }}</div>{% endif %}
</div>
</body>
</html>
