<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>資料上傳</title>
<style>
body { font-family: Arial, sans-serif; max-width: 880px; margin: 40px auto; padding: 0 20px; background:#f7f4f1; }
.box { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 24px; }
label { display:block; margin-top: 16px; margin-bottom: 6px; }
input[type=file] { width:100%; }
button { margin-top: 20px; padding: 10px 16px; background:#a96f6f; color:white; border:none; border-radius:8px; }
.msg { margin-top: 16px; color: green; }
</style>
</head>
<body>
<h1>QDM 報表上傳頁</h1>
<div class="box">
<form method="post" enctype="multipart/form-data">
<label>訂單報表</label>
<input type="file" name="order_file" required>
<label>庫存報表</label>
<input type="file" name="inventory_file" required>
<button type="submit">更新 Dashboard</button>
</form>
{% if message %}<div class="msg">{{ message }}</div>{% endif %}
{% if latest %}
<hr>
<div>最後更新時間：{{ latest.uploaded_at }}</div>
<div>訂單檔案：{{ latest.order_file_name }}</div>
<div>庫存檔案：{{ latest.inventory_file_name }}</div>
{% endif %}
</div>
<p><a href="/dashboard">前往 Dashboard</a></p>
</body>
</html>
